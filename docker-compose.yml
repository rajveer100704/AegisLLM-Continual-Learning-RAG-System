version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

  worker:
    build: .
    command: ["python", "streaming/consumer.py"]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./data:/app/data

volumes:
  redis_data:
